<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Sectoral responses to weather shocks</title>
  <desc id="desc">Stylized impulse response functions for crops and livestock-dairy after a weather shock.</desc>
  <rect width="640" height="360" fill="#f8f7f2"/>
  <rect x="54" y="44" width="532" height="248" rx="14" fill="#ffffff" stroke="#e5dfcf"/>
  <g stroke="#ece6d9" stroke-width="1">
    <line x1="94" y1="252" x2="548" y2="252"/>
    <line x1="94" y1="208" x2="548" y2="208"/>
    <line x1="94" y1="164" x2="548" y2="164"/>
    <line x1="94" y1="120" x2="548" y2="120"/>
  </g>
  <line x1="94" y1="176" x2="548" y2="176" stroke="#c9d1c4" stroke-width="2" stroke-dasharray="7 7"/>
  <path d="M98 176 C130 205 160 248 202 238 C250 225 280 150 324 138 C376 124 405 170 446 184 C487 198 520 183 548 176" fill="none" stroke="#3f7d4c" stroke-width="5" stroke-linecap="round"/>
  <path d="M98 176 C130 154 158 131 198 134 C248 138 276 178 326 206 C374 232 413 228 456 204 C495 182 520 174 548 176" fill="none" stroke="#8b5e3c" stroke-width="5" stroke-linecap="round"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="56" y="324" font-size="18" font-weight="700" fill="#334536">Weather-shock asymmetries</text>
    <text x="56" y="344" font-size="13" fill="#6f7169">Different dynamic responses across agricultural sectors</text>
    <rect x="358" y="310" width="10" height="10" rx="5" fill="#3f7d4c"/>
    <text x="375" y="319" font-size="12" fill="#6f7169">crops</text>
    <rect x="432" y="310" width="10" height="10" rx="5" fill="#8b5e3c"/>
    <text x="449" y="319" font-size="12" fill="#6f7169">livestock-dairy</text>
  </g>
</svg>
